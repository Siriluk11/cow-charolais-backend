<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Login - Charolais AI Scan</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #f6fbf7;
            --bg2: #edf7f0;
            --surface: #ffffff;
            --text: #173126;
            --muted: #6b7d73;
            --green: #21b66f;
            --green-dark: #148552;
            --border: #e3f1e8;
            --red: #ff5b6e;
            --shadow: 0 18px 45px rgba(20, 50, 35, .08);
            --shadow-soft: 0 10px 24px rgba(33, 182, 111, .14);
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            background:
                radial-gradient(circle at top left, rgba(33, 182, 111, .12), transparent 25%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', 'Noto Sans Thai', sans-serif;
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100dvh;
            padding: 28px 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            background: rgba(255, 255, 255, .94);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 24px 18px;
            box-shadow: var(--shadow);
        }

        .logo {
            width: 92px;
            height: 92px;
            margin: 0 auto 14px;
            border-radius: 28px;
            background: linear-gradient(135deg, #14965c, #29c979);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            color: #fff;
            box-shadow: 0 18px 36px rgba(33, 182, 111, .24);
        }

        h1 {
            margin: 0;
            text-align: center;
            font-size: 30px;
            font-weight: 800;
            color: #145337;
        }

        .subtitle {
            margin: 8px 0 22px;
            text-align: center;
            font-size: 14px;
            color: var(--muted);
            line-height: 1.7;
            font-family: 'Noto Sans Thai', sans-serif;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 800;
            color: #145337;
            margin-bottom: 8px;
            font-family: 'Noto Sans Thai', sans-serif;
        }

        input {
            width: 100%;
            border: 1.5px solid #d9efe2;
            border-radius: 18px;
            padding: 15px 16px;
            font-size: 15px;
            font-family: 'Plus Jakarta Sans', 'Noto Sans Thai', sans-serif;
            outline: none;
            background: #fff;
        }

        input:focus {
            border-color: #29c979;
            box-shadow: 0 0 0 4px rgba(41, 201, 121, .10);
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 18px;
            padding: 15px 18px;
            font-size: 15px;
            font-weight: 800;
            font-family: 'Plus Jakarta Sans', 'Noto Sans Thai', sans-serif;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
        }

        .btn-login {
            margin-top: 6px;
            background: linear-gradient(135deg, #14965c, #29c979);
            color: #fff;
        }

        .link-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 18px;
            font-size: 14px;
            font-weight: 800;
            font-family: 'Noto Sans Thai', sans-serif;
        }

        .link-row a {
            color: #148552;
            text-decoration: none;
            cursor: pointer;
        }

        .message {
            margin-top: 14px;
            min-height: 22px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            font-family: 'Noto Sans Thai', sans-serif;
            line-height: 1.6;
        }

        .message.error {
            color: #c2354b;
        }

        .message.success {
            color: #0e7b49;
        }

        .hint {
            margin-top: 18px;
            padding: 12px;
            border-radius: 18px;
            background: #eefbf3;
            color: #527064;
            font-size: 12px;
            line-height: 1.7;
            font-family: 'Noto Sans Thai', sans-serif;
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="login-card">
            <div class="logo">🐄</div>
            <h1>เข้าสู่ระบบ</h1>
            <div class="subtitle">
                Charolais AI Scan<br>
                ระบบวิเคราะห์ความสวยงามใบหน้าโคพันธุ์ชาโรเล่ส์
            </div>

            <div class="form-group">
                <label for="username">ชื่อผู้ใช้</label>
                <input id="username" type="text" placeholder="กรอกชื่อผู้ใช้">
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน</label>
                <input id="password" type="password" placeholder="กรอกรหัสผ่าน">
            </div>

            <button class="btn btn-login" id="loginBtn" type="button">เข้าสู่ระบบ</button>

            <div class="link-row">
                <a id="forgotLink">ลืมรหัสผ่าน?</a>
                <a id="registerLink">ลงทะเบียน</a>
            </div>

            <div class="message" id="message"></div>

            <div class="hint">
                ระบบนี้เป็นเวอร์ชันทดลอง บันทึกบัญชีไว้ในเครื่องของผู้ใช้ก่อน หากเปลี่ยนเครื่องหรือเปลี่ยนเบราว์เซอร์
                ต้องลงทะเบียนใหม่
            </div>
        </div>
    </div>

    <script>
        const USER_KEY = "cow_login_user";
        const LOGIN_STATUS_KEY = "cow_login_status";

        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const loginBtn = document.getElementById("loginBtn");
        const registerLink = document.getElementById("registerLink");
        const forgotLink = document.getElementById("forgotLink");
        const message = document.getElementById("message");

        function showMessage(text, type = "") {
            message.textContent = text;
            message.className = "message";
            if (type) message.classList.add(type);
        }

        function getUser() {
            try {
                const raw = localStorage.getItem(USER_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch {
                return null;
            }
        }

        function saveUser(username, password) {
            localStorage.setItem(USER_KEY, JSON.stringify({
                username: username,
                password: password,
                createdAt: new Date().toISOString()
            }));
        }

        loginBtn.addEventListener("click", () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showMessage("กรุณากรอกชื่อผู้ใช้และรหัสผ่าน", "error");
                return;
            }

            const user = getUser();

            if (!user) {
                showMessage("ยังไม่มีบัญชี กรุณากดลงทะเบียนก่อน", "error");
                return;
            }

            if (username === user.username && password === user.password) {
                localStorage.setItem(LOGIN_STATUS_KEY, "true");
                showMessage("เข้าสู่ระบบสำเร็จ", "success");

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 600);
            } else {
                showMessage("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง", "error");
            }
        });

        registerLink.addEventListener("click", () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showMessage("กรุณากรอกชื่อผู้ใช้และรหัสผ่านก่อนลงทะเบียน", "error");
                return;
            }

            saveUser(username, password);
            showMessage("ลงทะเบียนสำเร็จ สามารถเข้าสู่ระบบได้แล้ว", "success");
        });

        forgotLink.addEventListener("click", () => {
            const user = getUser();

            if (!user) {
                showMessage("ยังไม่มีบัญชีในเครื่องนี้ กรุณาลงทะเบียนใหม่", "error");
                return;
            }

            alert("บัญชีในเครื่องนี้\nชื่อผู้ใช้: " + user.username + "\nรหัสผ่าน: " + user.password);
        });
    </script>
</body>

</html>
