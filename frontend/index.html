<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Charolais AI Scan</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Prompt:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./app.css">
    <script src="./auth.js"></script>
</head>

<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="brand-mark cow-mark">
                <span>🐮</span>
            </div>

            <h1 style="text-align:center;">เข้าสู่ระบบ</h1>

            <div class="subtitle">
                Charolais AI Scan<br>
                ระบบวิเคราะห์ความสวยงามใบหน้าโคพันธุ์ชาโรเล่ส์
            </div>

            <div class="form-group">
                <label for="username">ชื่อผู้ใช้</label>
                <input id="username" type="text" placeholder="ชื่อผู้ใช้ภาษาไทยหรืออังกฤษ">
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน</label>
                <input id="password" type="password" placeholder="กรอกรหัสผ่าน">
            </div>

            <button class="btn btn-main" id="loginBtn" type="button">
                เข้าสู่ระบบ
            </button>

            <div class="link-row">
                <a href="register.html">ลงทะเบียน</a>
                <a href="forgot.html">ลืมรหัสผ่าน?</a>
            </div>

            <div class="message" id="message"></div>

            <div class="note">
                ระบบจะบันทึกบัญชีผู้ใช้และโปรไฟล์แยกตามชื่อผู้ใช้ พร้อมเข้ารหัสรหัสผ่านก่อนจัดเก็บในเครื่อง
            </div>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const loginBtn = document.getElementById("loginBtn");
        const message = document.getElementById("message");

        function showMessage(text, type = "") {
            message.textContent = text;
            message.className = "message";
            if (type) message.classList.add(type);
        }

        loginBtn.addEventListener("click", async () => {
            const result = await loginUser(usernameInput.value, passwordInput.value);

            if (!result.ok) {
                showMessage(result.message, "error");
                return;
            }

            showMessage(result.message, "success");

            setTimeout(() => {
                window.location.href = "scan.html";
            }, 500);
        });
    </script>
</body>

</html>
