<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Register - Charolais AI Scan</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Prompt:wght@500;600;700;800&display=swap"
        rel="stylesheet">

    <script src="./auth.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --primary: #0f6b45;
            --primary-2: #19a96b;
            --primary-soft: #e9f8f0;
            --ink: #10231b;
            --muted: #65756d;
            --card: rgba(255, 255, 255, .88);
            --line: rgba(15, 107, 69, .14);
            --shadow: 0 24px 70px rgba(16, 35, 27, .16);
            --danger: #c0394f;
        }

        html,
        body {
            margin: 0;
            min-height: 100dvh;
            font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(25, 169, 107, .20), transparent 30%),
                radial-gradient(circle at bottom right, rgba(15, 107, 69, .14), transparent 34%),
                linear-gradient(180deg, #f5fbf7 0%, #eaf4ef 100%);
        }

        .app {
            max-width: 480px;
            min-height: 100dvh;
            margin: 0 auto;
            padding: 24px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            width: 100%;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, .8);
            border-radius: 34px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
            padding: 24px 20px;
        }

        .brand-icon {
            width: 82px;
            height: 82px;
            border-radius: 26px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f6b45, #19a96b);
            box-shadow: 0 18px 40px rgba(15, 107, 69, .24);
        }

        .brand-icon svg {
            width: 42px;
            height: 42px;
            color: #fff;
        }

        h1 {
            margin: 0;
            text-align: center;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -.03em;
        }

        .subtitle {
            margin: 10px 0 22px;
            text-align: center;
            font-family: 'Noto Sans Thai', sans-serif;
            font-size: 14px;
            line-height: 1.8;
            color: var(--muted);
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #173b2a;
        }

        input {
            width: 100%;
            border: 1.5px solid var(--line);
            border-radius: 18px;
            padding: 15px 16px;
            font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
            font-size: 15px;
            outline: none;
            background: rgba(255, 255, 255, .86);
        }

        input:focus {
            border-color: var(--primary-2);
            box-shadow: 0 0 0 5px rgba(25, 169, 107, .12);
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 18px;
            padding: 15px 18px;
            font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }

        .btn-main {
            margin-top: 4px;
            color: #fff;
            background: linear-gradient(135deg, #0f6b45, #19a96b);
            box-shadow: 0 14px 30px rgba(15, 107, 69, .22);
        }

        .message {
            min-height: 22px;
            margin-top: 14px;
            text-align: center;
            font-family: 'Noto Sans Thai', sans-serif;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.7;
            color: var(--muted);
        }

        .message.error {
            color: var(--danger);
        }

        .message.success {
            color: var(--primary);
        }

        .link {
            display: block;
            margin-top: 16px;
            text-align: center;
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
        }

        .note {
            margin-top: 16px;
            padding: 12px;
            border-radius: 18px;
            background: var(--primary-soft);
            font-family: 'Noto Sans Thai', sans-serif;
            font-size: 12px;
            line-height: 1.8;
            color: #527064;
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="auth-card">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 3v18M5 8h14M5 16h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path d="M7 5h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"
                        stroke="currentColor" stroke-width="2" />
                </svg>
            </div>

            <h1>ลงทะเบียน</h1>
            <div class="subtitle">
                สร้างบัญชีผู้ใช้สำหรับ Charolais AI Scan
            </div>

            <div class="form-group">
                <label for="username">ชื่อผู้ใช้</label>
                <input id="username" type="text" placeholder="ใช้ภาษาไทยหรืออังกฤษได้">
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน</label>
                <input id="password" type="password" placeholder="อย่างน้อย 8 ตัว และมี A-Z 1 ตัว">
            </div>

            <div class="form-group">
                <label for="confirmPassword">ยืนยันรหัสผ่าน</label>
                <input id="confirmPassword" type="password" placeholder="กรอกรหัสผ่านอีกครั้ง">
            </div>

            <button class="btn btn-main" id="registerBtn" type="button">สร้างบัญชี</button>

            <div class="message" id="message"></div>

            <a class="link" href="index.html">มีบัญชีแล้ว เข้าสู่ระบบ</a>

            <div class="note">
                เงื่อนไขรหัสผ่าน: ต้องมีอย่างน้อย 8 ตัวอักษร และมีตัวอักษรภาษาอังกฤษตัวใหญ่ A-Z อย่างน้อย 1 ตัว
            </div>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const confirmPasswordInput = document.getElementById("confirmPassword");
        const registerBtn = document.getElementById("registerBtn");
        const message = document.getElementById("message");

        function showMessage(text, type = "") {
            message.textContent = text;
            message.className = "message";
            if (type) message.classList.add(type);
        }

        registerBtn.addEventListener("click", async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (password !== confirmPassword) {
                showMessage("รหัสผ่านและยืนยันรหัสผ่านไม่ตรงกัน", "error");
                return;
            }

            const result = await registerUser(username, password);

            if (!result.ok) {
                showMessage(result.message, "error");
                return;
            }

            showMessage(result.message, "success");

            setTimeout(() => {
                window.location.href = "index.html";
            }, 800);
        });
    </script>
</body>

</html>
