<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Charolais AI Scan</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Prompt:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./app.css">
    <script src="./auth.js"></script>
</head>

<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="brand-mark cow-mark"><span>🐮</span></div>

            <h1 style="text-align:center;">ลงทะเบียน</h1>
            <div class="subtitle">สร้างบัญชีผู้ใช้สำหรับ Charolais AI Scan</div>

            <div class="form-group">
                <label for="username">ชื่อผู้ใช้</label>
                <input id="username" type="text" placeholder="ใช้ภาษาไทยหรืออังกฤษได้">
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน</label>
                <input id="password" type="password" placeholder="อย่างน้อย 8 ตัว และมี A-Z 1 ตัว">
            </div>

            <div class="form-group">
                <label for="confirmPassword">ยืนยันรหัสผ่าน</label>
                <input id="confirmPassword" type="password" placeholder="กรอกรหัสผ่านอีกครั้ง">
            </div>

            <button class="btn btn-main" id="registerBtn" type="button">สร้างบัญชี</button>

            <div class="message" id="message"></div>

            <a class="link" href="index.html">มีบัญชีแล้ว เข้าสู่ระบบ</a>

            <div class="note">
                เงื่อนไขรหัสผ่าน: อย่างน้อย 8 ตัวอักษร และมีตัวอักษรภาษาอังกฤษตัวใหญ่ A-Z อย่างน้อย 1 ตัว
            </div>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const confirmPasswordInput = document.getElementById("confirmPassword");
        const registerBtn = document.getElementById("registerBtn");
        const message = document.getElementById("message");

        function showMessage(text, type = "") {
            message.textContent = text;
            message.className = "message";
            if (type) message.classList.add(type);
        }

        registerBtn.addEventListener("click", async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!username || !password || !confirmPassword) {
                showMessage("กรุณากรอกข้อมูลให้ครบ", "error");
                return;
            }

            if (password !== confirmPassword) {
                showMessage("รหัสผ่านและยืนยันรหัสผ่านไม่ตรงกัน", "error");
                return;
            }

            const result = await registerUser(username, password);

            if (!result.ok) {
                showMessage(result.message, "error");
                return;
            }

            showMessage(result.message, "success");

            setTimeout(() => {
                window.location.href = "index.html";
            }, 900);
        });
    </script>
</body>

</html>
