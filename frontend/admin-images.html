<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการภาพถ่ายใบหน้าโค</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Prompt:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./app.css">
    <script src="./auth.js"></script>
</head>

<body>
    <script>requireAdmin();</script>

    <main class="page">
        <section class="hero">
            <div class="hero-row">
                <div class="hero-icon">🖼️</div>
                <div>
                    <h1>จัดการ<br>ภาพถ่ายโค</h1>
                    <p>ค้นหา เพิ่ม ลบ และจัดเก็บข้อมูลภาพถ่ายใบหน้าโค</p>
                </div>
            </div>
        </section>

        <section class="card">
            <div class="section-title">
                <h2>เพิ่มข้อมูลภาพ</h2>
                <span class="pill">Images</span>
            </div>

            <div class="form-group">
                <label>รหัสภาพ / ชื่อไฟล์</label>
                <input id="imageCode" type="text" placeholder="เช่น IMG-001">
            </div>

            <div class="form-group">
                <label>รายละเอียดภาพ</label>
                <input id="imageDesc" type="text" placeholder="เช่น ใบหน้าโคด้านหน้า">
            </div>

            <div class="form-group">
                <label>ไฟล์ภาพ</label>
                <input id="imageFile" type="file" accept="image/*">
            </div>

            <button class="btn btn-green" onclick="saveImage()">บันทึกข้อมูลภาพ</button>

            <div class="form-group" style="margin-top:16px;">
                <label>ค้นหาข้อมูลภาพ</label>
                <input id="searchInput" type="text" placeholder="ค้นหารหัสภาพ / รายละเอียด" oninput="renderList()">
            </div>
        </section>

        <section class="card">
            <div class="section-title">
                <h2>รายการภาพถ่าย</h2>
                <span class="pill" id="count">0 รายการ</span>
            </div>
            <div id="list"></div>
        </section>

        <div class="button-row">
            <a href="admin.html" class="btn btn-light">กลับหน้า Admin</a>
            <button class="btn btn-red" onclick="logout()">ออกจากระบบ</button>
        </div>
    </main>

    <script>
        const KEY = "admin_images";

        function getData() {
            return JSON.parse(localStorage.getItem(KEY) || "[]");
        }

        function setData(data) {
            localStorage.setItem(KEY, JSON.stringify(data));
        }

        function saveImage() {
            const code = imageCode.value.trim();
            const desc = imageDesc.value.trim();
            const file = imageFile.files[0];

            if (!code || !desc) {
                alert("กรุณากรอกรหัสภาพและรายละเอียด");
                return;
            }

            const reader = new FileReader();

            reader.onload = function (e) {
                const data = getData();
                data.unshift({
                    code,
                    desc,
                    image: file ? e.target.result : "",
                    createdAt: new Date().toLocaleString("th-TH")
                });
                setData(data);
                imageCode.value = "";
                imageDesc.value = "";
                imageFile.value = "";
                renderList();
                alert("บันทึกข้อมูลภาพสำเร็จ");
            };

            if (file) reader.readAsDataURL(file);
            else reader.onload({ target: { result: "" } });
        }

        function deleteItem(index) {
            if (!confirm("ต้องการลบข้อมูลนี้ใช่หรือไม่")) return;
            const data = getData();
            data.splice(index, 1);
            setData(data);
            renderList();
        }

        function renderList() {
            const keyword = searchInput.value.toLowerCase();
            const data = getData();
            const filtered = data.filter(item =>
                item.code.toLowerCase().includes(keyword) ||
                item.desc.toLowerCase().includes(keyword)
            );

            count.textContent = filtered.length + " รายการ";

            if (!filtered.length) {
                list.innerHTML = `<div class="empty-state">ยังไม่มีข้อมูลภาพถ่าย</div>`;
                return;
            }

            list.innerHTML = filtered.map((item, index) => `
        <div class="history-item">
            <div class="history-row">
                ${item.image ? `<img class="history-thumb" src="${item.image}">` : `<div class="history-thumb empty">🖼️</div>`}
                <div class="history-content">
                    <h3>${item.code}</h3>
                    <p>${item.desc}</p>
                    <p><strong>เวลา:</strong> ${item.createdAt}</p>
                    <button class="btn btn-red" onclick="deleteItem(${index})">ลบ</button>
                </div>
            </div>
        </div>
    `).join("");
        }

        renderList();
    </script>
</body>

</html>
