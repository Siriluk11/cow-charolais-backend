<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Charolais AI Scan</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Prompt:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./app.css">
    <script src="./auth.js"></script>
</head>

<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="brand-mark cow-mark">
                <span>🐮</span>
            </div>

            <h1 style="text-align:center;">เปลี่ยนรหัสผ่าน</h1>

            <div class="subtitle">
                กรอกชื่อผู้ใช้และตั้งรหัสผ่านใหม่
            </div>

            <div class="form-group">
                <label for="username">ชื่อผู้ใช้</label>
                <input id="username" type="text" placeholder="กรอกชื่อผู้ใช้">
            </div>

            <div class="form-group">
                <label for="newPassword">รหัสผ่านใหม่</label>
                <input id="newPassword" type="password" placeholder="อย่างน้อย 8 ตัว และมี A-Z 1 ตัว">
            </div>

            <div class="form-group">
                <label for="confirmPassword">ยืนยันรหัสผ่านใหม่</label>
                <input id="confirmPassword" type="password" placeholder="กรอกรหัสผ่านใหม่อีกครั้ง">
            </div>

            <button class="btn btn-main" id="resetBtn" type="button">
                ยืนยันเปลี่ยนรหัสผ่าน
            </button>

            <div class="message" id="message"></div>

            <a class="link" href="index.html">กลับไปหน้าเข้าสู่ระบบ</a>

            <div class="note">
                รหัสผ่านใหม่ต้องมีอย่างน้อย 8 ตัว และมีตัวอักษรภาษาอังกฤษตัวใหญ่ A-Z อย่างน้อย 1 ตัว
            </div>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById("username");
        const newPasswordInput = document.getElementById("newPassword");
        const confirmPasswordInput = document.getElementById("confirmPassword");
        const resetBtn = document.getElementById("resetBtn");
        const message = document.getElementById("message");

        function showMessage(text, type = "") {
            message.textContent = text;
            message.className = "message";
            if (type) message.classList.add(type);
        }

        resetBtn.addEventListener("click", async () => {
            const username = usernameInput.value.trim();
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!username || !newPassword || !confirmPassword) {
                showMessage("กรุณากรอกข้อมูลให้ครบ", "error");
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage("รหัสผ่านใหม่และยืนยันรหัสผ่านไม่ตรงกัน", "error");
                return;
            }

            const result = await resetPassword(username, newPassword);

            if (!result.ok) {
                showMessage(result.message, "error");
                return;
            }

            showMessage(result.message, "success");

            setTimeout(() => {
                window.location.href = "index.html";
            }, 900);
        });
    </script>
</body>

</html>
