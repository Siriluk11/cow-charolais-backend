<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>History - Charolais AI Scan</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --green-dark: #0f5132;
            --green-main: #16a34a;
            --green-light: #22c55e;
            --text-main: #1f2937;
            --text-soft: #6b7280;
            --card-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            font-family: 'Prompt', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(34, 197, 94, 0.10), transparent 25%),
                radial-gradient(circle at bottom right, rgba(22, 163, 74, 0.08), transparent 28%),
                linear-gradient(180deg, #f7fff8 0%, #eef8f1 100%);
            color: var(--text-main);
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100dvh;
            padding: 22px 16px 120px;
        }

        .hero {
            background: linear-gradient(135deg, #14532d 0%, #22c55e 100%);
            border-radius: 32px;
            padding: 24px 20px 22px;
            color: white;
            box-shadow: 0 18px 40px rgba(22, 163, 74, 0.22);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            top: -60px;
            right: -60px;
        }

        .hero-top {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .hero-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .hero-icon {
            width: 66px;
            height: 66px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            backdrop-filter: blur(8px);
        }

        .hero h1 {
            margin: 0;
            font-size: 30px;
            line-height: 1.1;
            font-weight: 700;
        }

        .hero p {
            margin: 6px 0 0;
            font-size: 13px;
            opacity: 0.92;
        }

        .hero-badge {
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 10px 14px;
            border-radius: 16px;
            text-align: center;
            min-width: 84px;
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 1;
        }

        .hero-badge .small {
            font-size: 11px;
            opacity: 0.9;
        }

        .hero-badge .big {
            font-size: 18px;
            font-weight: 700;
            margin-top: 2px;
        }

        .section {
            margin-top: 18px;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .section-title h2 {
            margin: 0;
            font-size: 20px;
            color: var(--green-dark);
        }

        .section-title span {
            font-size: 12px;
            color: var(--text-soft);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .history-card {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(220, 252, 231, 0.95);
            box-shadow: var(--card-shadow);
            border-radius: 26px;
            padding: 16px;
            backdrop-filter: blur(8px);
        }

        .history-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .history-date {
            font-size: 14px;
            color: var(--text-soft);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-success {
            background: #dcfce7;
            color: #166534;
        }

        .status-fail {
            background: #fee2e2;
            color: #991b1b;
        }

        .history-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .mini-box {
            background: linear-gradient(180deg, #ffffff 0%, #f7fff8 100%);
            border: 1px solid #dcfce7;
            border-radius: 18px;
            padding: 14px;
        }

        .mini-label {
            font-size: 12px;
            color: var(--text-soft);
        }

        .mini-value {
            margin-top: 6px;
            font-size: 24px;
            font-weight: 700;
            color: var(--green-dark);
            line-height: 1.1;
        }

        .empty-card {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(220, 252, 231, 0.95);
            box-shadow: var(--card-shadow);
            border-radius: 26px;
            padding: 28px 18px;
            text-align: center;
            color: var(--text-soft);
        }

        .floating-nav {
            position: fixed;
            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);
            width: min(470px, calc(100% - 20px));
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(220, 252, 231, 0.95);
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
            border-radius: 28px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 10px 8px calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .floating-nav a {
            text-decoration: none;
            color: var(--green-dark);
            text-align: center;
            padding: 8px 4px;
            border-radius: 18px;
            font-size: 12px;
            font-weight: 600;
        }

        .floating-nav a.active {
            background: linear-gradient(135deg, #14532d, #22c55e);
            color: white;
            box-shadow: 0 10px 20px rgba(22, 163, 74, 0.25);
        }

        @media (max-width:480px) {
            .hero h1 {
                font-size: 27px;
            }

            .history-grid {
                grid-template-columns: 1fr;
            }

            .mini-value {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="hero">
            <div class="hero-top">
                <div class="hero-left">
                    <div class="hero-icon">🕘</div>
                    <div>
                        <h1>History</h1>
                        <p>ผลการสแกนย้อนหลังของระบบวิเคราะห์หน้าวัว</p>
                    </div>
                </div>

                <div class="hero-badge">
                    <div class="small">Records</div>
                    <div class="big" id="historyCount">0</div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">
                <h2>ประวัติการสแกน</h2>
                <span>ล่าสุดก่อน</span>
            </div>

            <div id="historyList" class="history-list"></div>
        </div>
    </div>

    <div class="floating-nav">
        <a href="dashboard.html">🏠<br>Home</a>
        <a href="index.html">📷<br>Scan</a>
        <a href="history.html" class="active">🕘<br>History</a>
        <a href="profile.html">👤<br>Profile</a>
    </div>

    <script>
        const API_BASE = "https://cow-charolais-backend.onrender.com";

        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE}/history`);
                const history = await response.json();

                const historyList = document.getElementById("historyList");
                document.getElementById("historyCount").textContent = history.length;

                if (!history.length) {
                    historyList.innerHTML = `
                        <div class="empty-card">
                            ยังไม่มีประวัติการสแกน<br>
                            เริ่มสแกนจากหน้า Scan เพื่อให้ระบบบันทึกข้อมูล
                        </div>
                    `;
                    return;
                }

                historyList.innerHTML = history.map(item => `
                    <div class="history-card">
                        <div class="history-head">
                            <div class="history-date">📅 ${item.date || "-"}</div>
                            <div class="status-pill ${item.status === "ตรวจพบหน้าวัว" ? "status-success" : "status-fail"}">
                                ${item.status === "ตรวจพบหน้าวัว" ? "✅" : "❌"} ${item.status || "-"}
                            </div>
                        </div>

                        <div class="history-grid">
                            <div class="mini-box">
                                <div class="mini-label">Confidence</div>
                                <div class="mini-value">${item.confidence || "-"}</div>
                            </div>
                            <div class="mini-box">
                                <div class="mini-label">Beauty Score</div>
                                <div class="mini-value">${item.beautyScore || "-"}</div>
                            </div>
                        </div>
                    </div>
                `).join("");
            } catch (error) {
                console.error("โหลด history ไม่สำเร็จ", error);
            }
        }

        loadHistory();
    </script>
</body>

</html>
