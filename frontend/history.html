<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>History - Charolais AI Scan</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Prompt:wght@500;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./auth.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --primary: #0f6b45;
            --primary-2: #19a96b;
            --ink: #10231b;
            --muted: #65756d;
            --card: rgba(255, 255, 255, .86);
            --line: rgba(15, 107, 69, .14);
            --shadow: 0 24px 70px rgba(16, 35, 27, .14);
            --danger: #c0394f;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(25, 169, 107, .20), transparent 30%),
                radial-gradient(circle at top right, rgba(73, 104, 217, .10), transparent 30%),
                linear-gradient(180deg, #f5fbf7 0%, #eaf4ef 100%);
        }

        .app {
            max-width: 520px;
            margin: 0 auto;
            min-height: 100dvh;
            padding: 18px 14px 126px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            border-radius: 34px;
            padding: 24px 18px;
            color: #fff;
            background:
                radial-gradient(circle at top right, rgba(255, 255, 255, .22), transparent 28%),
                linear-gradient(135deg, #073d27 0%, #0f6b45 48%, #19a96b 100%);
            box-shadow: 0 24px 60px rgba(15, 107, 69, .25);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 18px;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 220px;
            height: 220px;
            right: -90px;
            top: -90px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .10);
        }

        .hero-content,
        .record-badge {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            margin: 0;
            font-size: 34px;
            line-height: 1.04;
            font-weight: 800;
            letter-spacing: -.04em;
        }

        .hero p {
            margin: 8px 0 0;
            max-width: 270px;
            font-size: 13px;
            line-height: 1.75;
            color: rgba(255, 255, 255, .84);
            font-family: 'Noto Sans Thai', sans-serif;
        }

        .record-badge {
            min-width: 104px;
            padding: 14px;
            border-radius: 24px;
            text-align: center;
            background: rgba(255, 255, 255, .16);
            border: 1px solid rgba(255, 255, 255, .22);
            backdrop-filter: blur(10px);
            font-weight: 800;
        }

        .record-badge .small {
            font-size: 11px;
            opacity: .88;
        }

        .record-badge .big {
            font-size: 32px;
            margin-top: 4px;
        }

        .glass-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, .8);
            border-radius: 30px;
            padding: 16px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .section-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: -.03em;
            color: #173b2a;
        }

        .section-sub {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 14px;
            font-family: 'Noto Sans Thai', sans-serif;
            font-weight: 700;
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .btn {
            border: none;
            border-radius: 20px;
            padding: 15px 14px;
            font-size: 14px;
            font-weight: 800;
            font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .18s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-green {
            color: #fff;
            background: linear-gradient(135deg, #0f6b45, #19a96b);
            box-shadow: 0 14px 28px rgba(15, 107, 69, .22);
        }

        .btn-red {
            color: #fff;
            background: linear-gradient(135deg, #c0394f, #ff7b5f);
            box-shadow: 0 14px 28px rgba(192, 57, 79, .18);
        }

        #historyList {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .history-item {
            border-radius: 26px;
            padding: 14px;
            background: linear-gradient(180deg, #fff 0%, #f4fbf7 100%);
            border: 1px solid var(--line);
            box-shadow: 0 12px 26px rgba(16, 145, 87, .06);
        }

        .history-row {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .history-thumb {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            object-fit: cover;
            background: #f1f6f3;
            flex-shrink: 0;
            border: 1px solid var(--line);
        }

        .history-thumb.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            background: linear-gradient(135deg, #e9f8f0, #ffffff);
        }

        .history-thumb.empty svg {
            width: 38px;
            height: 38px;
        }

        .history-content {
            flex: 1;
            min-width: 0;
        }

        .history-content h3 {
            margin: 0 0 8px;
            font-size: 18px;
            color: var(--primary);
            font-weight: 800;
            line-height: 1.35;
        }

        .history-content p {
            margin: 0;
            font-size: 13px;
            line-height: 1.75;
            color: #486055;
            word-break: break-word;
            font-family: 'Noto Sans Thai', sans-serif;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            border-radius: 24px;
            background: linear-gradient(180deg, #fff8fa 0%, #fff 100%);
            border: 1px solid #ffd8df;
            color: var(--danger);
            font-weight: 800;
            font-family: 'Noto Sans Thai', sans-serif;
        }

        .floating-nav {
            position: fixed;
            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);
            width: min(490px, calc(100% - 18px));
            background: rgba(255, 255, 255, .82);
            border: 1px solid rgba(255, 255, 255, .86);
            border-radius: 32px;
            box-shadow: 0 18px 45px rgba(18, 37, 27, .14);
            backdrop-filter: blur(20px);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 10px 8px calc(10px + env(safe-area-inset-bottom));
            z-index: 999;
        }

        .floating-nav a {
            text-decoration: none;
            color: #21503b;
            text-align: center;
            padding: 10px 4px;
            border-radius: 23px;
            font-size: 12px;
            font-weight: 800;
            line-height: 1.35;
        }

        .floating-nav a.active {
            color: #fff;
            background: linear-gradient(135deg, #0f6b45, #19a96b);
            box-shadow: 0 12px 28px rgba(15, 107, 69, .22);
        }

        .nav-ico {
            display: block;
            font-size: 18px;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>
    <script>
        requireLogin();
    </script>

    <div class="app">
        <section class="hero">
            <div class="hero-content">
                <h1>History</h1>
                <p>ประวัติผลการสแกนย้อนหลัง แสดงรายการล่าสุดก่อน พร้อมระดับดาวและความมั่นใจของผลวิเคราะห์</p>
            </div>
            <div class="record-badge">
                <div class="small">Records</div>
                <div class="big" id="recordCount">0</div>
            </div>
        </section>

        <section class="glass-card">
            <div class="section-title">ประวัติการสแกน</div>
            <div class="section-sub">เรียงจากรายการล่าสุดไปเก่าสุด</div>

            <div class="button-row">
                <a href="scan.html" class="btn btn-green">ไปหน้า Scan</a>
                <button id="clearHistoryBtn" class="btn btn-red" type="button">ล้างประวัติ</button>
            </div>

            <div id="historyList"></div>
        </section>
    </div>

    <nav class="floating-nav">
        <a href="scan.html"><span class="nav-ico">⌁</span>Scan</a>
        <a href="history.html" class="active"><span class="nav-ico">◷</span>History</a>
        <a href="profile.html"><span class="nav-ico">◎</span>Profile</a>
    </nav>

    <script>
        const LOCAL_HISTORY_KEY = "cow_scan_history";

        function hasFunction(name) {
            return typeof window[name] === "function";
        }

        function getHistorySafe() {
            try {
                const raw = localStorage.getItem(LOCAL_HISTORY_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                console.error("โหลดประวัติไม่สำเร็จ:", error);
                return [];
            }
        }

        async function loadHistoryData() {
            if (hasFunction("getScanHistoryFromDB")) {
                try {
                    const dbData = await window.getScanHistoryFromDB(50);
                    if (Array.isArray(dbData) && dbData.length) {
                        return dbData.map(item => ({
                            image: item.image_url || "",
                            predictedClass: item.class_name || (item.score ? `คลาส ${item.score}` : "-"),
                            star: item.score || 0,
                            confidence: Number(item.confidence || 0).toFixed(2) + "%",
                            createdAt: item.created_at ? new Date(item.created_at).toLocaleString("th-TH") : "-"
                        }));
                    }
                } catch (error) {
                    console.error("โหลดประวัติจาก DB ไม่สำเร็จ:", error);
                }
            }

            return getHistorySafe();
        }

        function cowIcon() {
            return `
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M5 10.5C5 6.9 8.1 4 12 4s7 2.9 7 6.5V13c0 3.9-3.1 7-7 7s-7-3.1-7-7v-2.5Z"
                        stroke="currentColor" stroke-width="2"/>
                    <path d="M8 5 6 2M16 5l2-3M9 12h.01M15 12h.01M9.5 16c1.5 1 3.5 1 5 0"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            `;
        }

        async function renderHistory() {
            const historyList = document.getElementById("historyList");
            const recordCount = document.getElementById("recordCount");
            const history = await loadHistoryData();

            recordCount.textContent = history.length;

            if (!history.length) {
                historyList.innerHTML = `
                    <div class="empty-state">
                        ยังไม่มีประวัติการวิเคราะห์
                    </div>
                `;
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <div class="history-row">
                        ${item.image
                    ? `<img class="history-thumb" src="${item.image}" alt="history image">`
                    : `<div class="history-thumb empty">${cowIcon()}</div>`
                }
                        <div class="history-content">
                            <h3>${item.predictedClass || "-"}</h3>
                            <p><strong>ระดับดาว:</strong> ${item.star ? item.star + " ดาว" : "-"}</p>
                            <p><strong>ความมั่นใจ:</strong> ${item.confidence || "-"}</p>
                            <p><strong>เวลา:</strong> ${item.createdAt || "-"}</p>
                        </div>
                    </div>
                </div>
            `).join("");
        }

        function clearAllHistory() {
            const ok = confirm("ต้องการลบประวัติทั้งหมดใช่หรือไม่");
            if (!ok) return;

            localStorage.removeItem(LOCAL_HISTORY_KEY);
            renderHistory();
        }

        document.getElementById("clearHistoryBtn").addEventListener("click", clearAllHistory);
        renderHistory();
    </script>
</body>

</html>
