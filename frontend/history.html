<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>History - Charolais AI Scan</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --green-dark: #14532d;
            --green-main: #16a34a;
            --shadow-soft: 0 10px 24px rgba(15, 23, 42, 0.08);
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(180deg, #f6fff7 0%, #effcf2 100%);
            color: #1f2937;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top left, rgba(34, 197, 94, 0.12), transparent 28%),
                radial-gradient(circle at top right, rgba(22, 163, 74, 0.08), transparent 24%),
                radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.10), transparent 28%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
            padding: 26px 16px 120px;
            min-height: calc(100dvh - 20px);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            margin: 0 auto 14px;
            background: linear-gradient(135deg, #14532d, #22c55e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            color: white;
            box-shadow: 0 14px 30px rgba(34, 197, 94, 0.25);
            border: 4px solid rgba(255, 255, 255, 0.7);
        }

        h1 {
            margin: 0;
            color: #14532d;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-top: 6px;
            margin-bottom: 20px;
        }

        .item {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 22px;
            padding: 18px;
            box-shadow: var(--shadow-soft);
            border: 1px solid #dcfce7;
            margin-bottom: 14px;
            line-height: 1.8;
        }

        .item strong {
            color: #14532d;
        }

        .empty {
            text-align: center;
            color: #6b7280;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 22px;
            padding: 22px;
            border: 1px solid #dcfce7;
            box-shadow: var(--shadow-soft);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            border-top: 1px solid #d1fae5;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 10px 6px calc(10px + env(safe-area-inset-bottom));
            backdrop-filter: blur(8px);
            z-index: 50;
        }

        .bottom-nav a {
            text-decoration: none;
            color: #14532d;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
        }

        .bottom-nav a.active {
            color: #16a34a;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">🕘</div>
            <h1>History</h1>
            <div class="subtitle">ประวัติการสแกนล่าสุดของระบบ</div>
        </div>

        <div id="historyList"></div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html">🏠<br>Home</a>
        <a href="index.html">📷<br>Scan</a>
        <a href="history.html" class="active">🕘<br>History</a>
        <a href="profile.html">👤<br>Profile</a>
    </div>

    <script>
        const history = JSON.parse(localStorage.getItem("scanHistory")) || [];
        const historyList = document.getElementById("historyList");

        if (history.length === 0) {
            historyList.innerHTML = '<div class="empty">ยังไม่มีประวัติการสแกน</div>';
        } else {
            historyList.innerHTML = history.map(item => `
                <div class="item">
                    <div><strong>วันที่:</strong> ${item.date || "-"}</div>
                    <div><strong>สถานะ:</strong> ${item.status || "-"}</div>
                    <div><strong>Confidence:</strong> ${item.confidence || "-"}</div>
                    <div><strong>Beauty Score:</strong> ${item.beautyScore || "-"}</div>
                </div>
            `).join("");
        }
    </script>
</body>

</html>
