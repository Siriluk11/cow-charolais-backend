<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>

    <!-- ฟอนต์ -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- CSS ใหม่ -->
    <link rel="stylesheet" href="./app.css">

    <!-- JS -->
    <script src="./auth.js"></script>
</head>

<body>
    <script>requireLogin();</script>

    <div class="page">

        <div class="hero">
            <h1>History</h1>
            <p>ประวัติการวิเคราะห์ทั้งหมดของคุณ</p>
        </div>

        <div class="card">

            <div class="section-title">
                <h2>รายการทั้งหมด</h2>
                <span class="pill" id="count">0 รายการ</span>
            </div>

            <div class="button-row">
                <a href="scan.html" class="btn btn-green">ไปหน้า Scan</a>
                <button class="btn btn-red" onclick="clearHistory()">ล้างข้อมูล</button>
            </div>

            <div id="historyList"></div>

        </div>

    </div>

    <nav class="floating-nav">
        <a href="scan.html">⌁<br>Scan</a>
        <a href="history.html" class="active">◷<br>History</a>
        <a href="profile.html">◎<br>Profile</a>
    </nav>

    <script>
        const KEY = "cow_scan_history";

        function loadHistory() {
            const list = JSON.parse(localStorage.getItem(KEY) || "[]");
            const container = document.getElementById("historyList");
            const count = document.getElementById("count");

            count.textContent = list.length + " รายการ";

            if (!list.length) {
                container.innerHTML = `<div class="empty-state">ยังไม่มีข้อมูล</div>`;
                return;
            }

            container.innerHTML = list.map(i => `
        <div class="history-item">
            <div class="history-row">
                ${i.image ? `<img src="${i.image}" class="history-thumb">` : `<div class="history-thumb empty">◎</div>`}
                <div class="history-content">
                    <h3>${i.predictedClass}</h3>
                    <p>⭐ ${i.star} ดาว</p>
                    <p>ความมั่นใจ ${i.confidence}</p>
                    <p>${i.createdAt}</p>
                </div>
            </div>
        </div>
    `).join("");
        }

        function clearHistory() {
            if (confirm("ลบทั้งหมด?")) {
                localStorage.removeItem(KEY);
                loadHistory();
            }
        }

        loadHistory();
    </script>

</body>

</html>
