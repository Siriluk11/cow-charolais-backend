<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Profile - Charolais AI Scan</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Prompt:wght@500;600;700;800&display=swap"
        rel="stylesheet">

    <script src="./auth.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --primary: #0f6b45;
            --primary-2: #19a96b;
            --primary-soft: #e9f8f0;
            --ink: #10231b;
            --muted: #65756d;
            --card: rgba(255, 255, 255, .86);
            --line: rgba(15, 107, 69, .14);
            --shadow: 0 24px 70px rgba(16, 35, 27, .14);
            --danger: #c0394f;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            background:
                radial-gradient(circle at top left, rgba(25, 169, 107, .20), transparent 30%),
                radial-gradient(circle at top right, rgba(73, 104, 217, .10), transparent 30%),
                linear-gradient(180deg, #f5fbf7 0%, #eaf4ef 100%);
            color: var(--ink);
            font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
        }

        .app {
            max-width: 520px;
            margin: 0 auto;
            min-height: 100dvh;
            padding: 18px 14px 126px;
        }

        .top-card {
            position: relative;
            overflow: hidden;
            border-radius: 34px;
            padding: 24px 18px;
            color: #fff;
            background:
                radial-gradient(circle at top right, rgba(255, 255, 255, .22), transparent 28%),
                linear-gradient(135deg, #073d27 0%, #0f6b45 48%, #19a96b 100%);
            box-shadow: 0 24px 60px rgba(15, 107, 69, .25);
            margin-bottom: 18px;
            text-align: center;
        }

        .top-card::before {
            content: "";
            position: absolute;
            width: 220px;
            height: 220px;
            right: -90px;
            top: -90px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .10);
        }

        .top-avatar {
            position: relative;
            z-index: 1;
            width: 98px;
            height: 98px;
            margin: 0 auto 14px;
            border-radius: 32px;
            background: rgba(255, 255, 255, .16);
            border: 1px solid rgba(255, 255, 255, .22);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .top-avatar svg {
            width: 48px;
            height: 48px;
        }

        .top-card h1 {
            position: relative;
            z-index: 1;
            margin: 0;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -.04em;
        }

        .top-card p {
            position: relative;
            z-index: 1;
            margin: 8px 0 0;
            font-size: 14px;
            color: rgba(255, 255, 255, .84);
            line-height: 1.7;
            font-family: 'Noto Sans Thai', sans-serif;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, .8);
            border-radius: 30px;
            padding: 18px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 21px;
            font-weight: 800;
            color: #173b2a;
            margin-bottom: 16px;
            letter-spacing: -.02em;
        }

        .card-title-icon {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            background: var(--primary-soft);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 24px rgba(15, 107, 69, .08);
        }

        .card-title-icon svg {
            width: 24px;
            height: 24px;
        }

        .profile-avatar-wrap {
            text-align: center;
            margin-bottom: 18px;
        }

        .profile-avatar {
            width: 132px;
            height: 132px;
            border-radius: 36px;
            object-fit: cover;
            border: 5px solid rgba(255, 255, 255, .9);
            background: #fff;
            display: none;
            box-shadow: 0 14px 34px rgba(15, 107, 69, .18);
        }

        .profile-avatar-placeholder {
            width: 132px;
            height: 132px;
            border-radius: 36px;
            margin: 0 auto;
            border: 5px solid rgba(255, 255, 255, .9);
            background: linear-gradient(135deg, #0f6b45, #19a96b);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 14px 34px rgba(15, 107, 69, .18);
        }

        .profile-avatar-placeholder svg {
            width: 58px;
            height: 58px;
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
            margin-bottom: 18px;
        }

        .btn {
            border: none;
            border-radius: 20px;
            padding: 14px 18px;
            font-size: 14px;
            font-weight: 800;
            font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
            cursor: pointer;
        }

        .btn-green {
            background: linear-gradient(135deg, #0f6b45, #19a96b);
            color: #fff;
            box-shadow: 0 14px 28px rgba(15, 107, 69, .22);
        }

        .btn-red {
            background: linear-gradient(135deg, #c0394f, #ff7b5f);
            color: #fff;
            box-shadow: 0 14px 28px rgba(192, 57, 79, .18);
        }

        .btn-save {
            width: 100%;
            margin-top: 6px;
            background: linear-gradient(135deg, #0f6b45, #19a96b);
            color: #fff;
            box-shadow: 0 14px 28px rgba(15, 107, 69, .22);
        }

        .btn-logout {
            width: 100%;
            margin-top: 12px;
            background: linear-gradient(135deg, #c0394f, #ff7b5f);
            color: #fff;
            box-shadow: 0 14px 28px rgba(192, 57, 79, .18);
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 800;
            color: #173b2a;
            margin-bottom: 8px;
            font-family: 'Noto Sans Thai', sans-serif;
        }

        .form-input {
            width: 100%;
            border: 1.5px solid var(--line);
            border-radius: 20px;
            padding: 15px 16px;
            font-size: 15px;
            font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
            outline: none;
            background: rgba(255, 255, 255, .86);
        }

        .form-input:focus {
            border-color: var(--primary-2);
            box-shadow: 0 0 0 5px rgba(25, 169, 107, .12);
        }

        .form-input[readonly] {
            background: #f4f8f6;
            color: #65756d;
        }

        .hint {
            margin-top: 12px;
            padding: 13px;
            border-radius: 20px;
            background: rgba(255, 255, 255, .65);
            font-size: 12px;
            color: var(--muted);
            line-height: 1.8;
            font-family: 'Noto Sans Thai', sans-serif;
            font-weight: 600;
        }

        .floating-nav {
            position: fixed;
            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);
            width: min(490px, calc(100% - 18px));
            background: rgba(255, 255, 255, .82);
            border: 1px solid rgba(255, 255, 255, .86);
            box-shadow: 0 18px 45px rgba(18, 37, 27, .14);
            border-radius: 32px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 10px 8px calc(10px + env(safe-area-inset-bottom));
            backdrop-filter: blur(20px);
            z-index: 999;
        }

        .floating-nav a {
            text-decoration: none;
            color: #21503b;
            text-align: center;
            padding: 10px 4px;
            border-radius: 23px;
            font-size: 12px;
            font-weight: 800;
            line-height: 1.35;
        }

        .floating-nav a.active {
            background: linear-gradient(135deg, #0f6b45, #19a96b);
            color: #fff;
            box-shadow: 0 12px 28px rgba(15, 107, 69, .22);
        }

        .nav-ico {
            display: block;
            font-size: 18px;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>
    <script>
        requireLogin();
    </script>

    <div class="app">
        <div class="top-card">
            <div class="top-avatar">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="2" />
                    <path d="M4 21c1.6-4.2 4.6-6 8-6s6.4 1.8 8 6" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" />
                </svg>
            </div>
            <h1>Profile</h1>
            <p>จัดการข้อมูลผู้ใช้ รูปโปรไฟล์ และชื่อฟาร์มของคุณ</p>
        </div>

        <div class="card">
            <div class="card-title">
                <div class="card-title-icon">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="2" />
                        <path d="M4 21c1.6-4.2 4.6-6 8-6s6.4 1.8 8 6" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                </div>
                <div>ข้อมูลโปรไฟล์</div>
            </div>

            <div class="profile-avatar-wrap">
                <img id="profileAvatar" class="profile-avatar" alt="Profile Avatar">
                <div id="profileAvatarPlaceholder" class="profile-avatar-placeholder">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="2" />
                        <path d="M4 21c1.6-4.2 4.6-6 8-6s6.4 1.8 8 6" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                </div>

                <div class="btn-row">
                    <button class="btn btn-green" id="uploadAvatarBtn" type="button">อัปโหลดรูป</button>
                    <button class="btn btn-red" id="deleteAvatarBtn" type="button">ลบรูป</button>
                </div>

                <input type="file" id="avatarInput" accept="image/*" style="display:none;">
            </div>

            <div class="form-group">
                <label class="form-label" for="usernameInput">ชื่อผู้ใช้</label>
                <input class="form-input" id="usernameInput" type="text" placeholder="ชื่อผู้ใช้" readonly>
            </div>

            <div class="form-group">
                <label class="form-label" for="farmInput">ชื่อฟาร์ม</label>
                <input class="form-input" id="farmInput" type="text" placeholder="กรอกชื่อฟาร์ม">
            </div>

            <button class="btn btn-save" id="saveProfileBtn" type="button">บันทึกข้อมูลโปรไฟล์</button>
            <button class="btn btn-logout" id="logoutBtn" type="button">ออกจากระบบ</button>

            <div class="hint">
                ข้อมูลโปรไฟล์จะบันทึกแยกตามบัญชีผู้ใช้ในเครื่องนี้ หากเปลี่ยนเครื่องหรือเบราว์เซอร์อาจต้องลงทะเบียนใหม่
            </div>
        </div>
    </div>

    <nav class="floating-nav">
        <a href="scan.html"><span class="nav-ico">⌁</span>Scan</a>
        <a href="history.html"><span class="nav-ico">◷</span>History</a>
        <a href="profile.html" class="active"><span class="nav-ico">◎</span>Profile</a>
    </nav>

    <script>
        const profileAvatar = document.getElementById("profileAvatar");
        const profileAvatarPlaceholder = document.getElementById("profileAvatarPlaceholder");
        const avatarInput = document.getElementById("avatarInput");
        const usernameInput = document.getElementById("usernameInput");
        const farmInput = document.getElementById("farmInput");
        const uploadAvatarBtn = document.getElementById("uploadAvatarBtn");
        const deleteAvatarBtn = document.getElementById("deleteAvatarBtn");
        const saveProfileBtn = document.getElementById("saveProfileBtn");
        const logoutBtn = document.getElementById("logoutBtn");

        let currentAvatarUrl = "";

        function showAvatar(url) {
            if (url) {
                profileAvatar.src = url;
                profileAvatar.style.display = "block";
                profileAvatarPlaceholder.style.display = "none";
            } else {
                profileAvatar.removeAttribute("src");
                profileAvatar.style.display = "none";
                profileAvatarPlaceholder.style.display = "flex";
            }
        }

        function resizeImage(file, maxSize = 320, quality = 0.78) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();

                reader.onload = (e) => {
                    const img = new Image();

                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxSize) {
                                height = Math.round((height * maxSize) / width);
                                width = maxSize;
                            }
                        } else {
                            if (height > maxSize) {
                                width = Math.round((width * maxSize) / height);
                                height = maxSize;
                            }
                        }

                        const canvas = document.createElement("canvas");
                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext("2d");
                        ctx.drawImage(img, 0, 0, width, height);

                        resolve(canvas.toDataURL("image/jpeg", quality));
                    };

                    img.onerror = () => reject(new Error("โหลดรูปไม่สำเร็จ"));
                    img.src = e.target.result;
                };

                reader.onerror = () => reject(new Error("อ่านไฟล์ไม่สำเร็จ"));
                reader.readAsDataURL(file);
            });
        }

        function loadProfilePage() {
            const session = getCurrentUser();
            const profile = getProfile();

            usernameInput.value = profile?.username || session?.username || "";
            farmInput.value = profile?.farmName || "";
            currentAvatarUrl = profile?.avatar || "";

            showAvatar(currentAvatarUrl);
        }

        uploadAvatarBtn.addEventListener("click", () => {
            avatarInput.click();
        });

        avatarInput.addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                currentAvatarUrl = await resizeImage(file, 320, 0.78);
                showAvatar(currentAvatarUrl);
                alert("อัปโหลดรูปโปรไฟล์สำเร็จ");
            } catch (error) {
                console.error(error);
                alert("อัปโหลดรูปไม่สำเร็จ");
            } finally {
                avatarInput.value = "";
            }
        });

        deleteAvatarBtn.addEventListener("click", () => {
            currentAvatarUrl = "";
            showAvatar("");
            alert("ลบรูปโปรไฟล์แล้ว");
        });

        saveProfileBtn.addEventListener("click", () => {
            const saved = saveProfile({
                farmName: farmInput.value.trim(),
                avatar: currentAvatarUrl
            });

            alert(saved ? "บันทึกข้อมูลโปรไฟล์สำเร็จ" : "บันทึกข้อมูลไม่สำเร็จ");
        });

        logoutBtn.addEventListener("click", () => {
            const ok = confirm("ต้องการออกจากระบบใช่หรือไม่");
            if (!ok) return;
            logout();
        });

        loadProfilePage();
    </script>
</body>

</html>
