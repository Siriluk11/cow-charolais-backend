<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./app.css">
    <script src="./auth.js"></script>
</head>

<body>
    <script>requireLogin();</script>

    <div class="page">

        <div class="hero">
            <h1>Profile</h1>
            <p>จัดการข้อมูลบัญชีผู้ใช้</p>
        </div>

        <div class="card">

            <div class="profile-avatar-wrap">
                <img id="avatar" class="profile-avatar">
                <div id="avatarPlaceholder" class="profile-avatar-placeholder">◎</div>

                <div class="btn-row">
                    <button class="btn btn-green" onclick="upload()">อัปโหลด</button>
                    <button class="btn btn-red" onclick="removeAvatar()">ลบ</button>
                </div>

                <input type="file" id="file" style="display:none;">
            </div>

            <div class="form-group">
                <label>ชื่อผู้ใช้</label>
                <input id="username" class="form-input" readonly>
            </div>

            <div class="form-group">
                <label>ชื่อฟาร์ม</label>
                <input id="farm" class="form-input">
            </div>

            <button class="btn btn-green" onclick="save()">บันทึก</button>
            <button class="btn btn-red" onclick="logout()">ออกจากระบบ</button>

        </div>

    </div>

    <nav class="floating-nav">
        <a href="scan.html">⌁<br>Scan</a>
        <a href="history.html">◷<br>History</a>
        <a href="profile.html" class="active">◎<br>Profile</a>
    </nav>

    <script>
        const KEY = "profile_";

        function load() {
            const user = getCurrentUser();
            const p = JSON.parse(localStorage.getItem(KEY + user.username) || "{}");

            document.getElementById("username").value = user.username;
            document.getElementById("farm").value = p.farm || "";

            if (p.avatar) {
                avatar.src = p.avatar;
                avatar.style.display = "block";
                avatarPlaceholder.style.display = "none";
            }
        }

        function upload() {
            file.click();
        }

        file.onchange = e => {
            const reader = new FileReader();
            reader.onload = () => {
                avatar.src = reader.result;
                avatar.style.display = "block";
                avatarPlaceholder.style.display = "none";
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function removeAvatar() {
            avatar.src = "";
            avatar.style.display = "none";
            avatarPlaceholder.style.display = "flex";
        }

        function save() {
            const user = getCurrentUser();
            const data = {
                farm: farm.value,
                avatar: avatar.src
            };

            localStorage.setItem(KEY + user.username, JSON.stringify(data));
            alert("บันทึกแล้ว");
        }

        load();
    </script>

</body>

</html>
