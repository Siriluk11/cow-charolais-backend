<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Charolais AI Scan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(180deg, #f6fff7 0%, #effcf2 100%);
            color: #1f2937;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px 90px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, #14532d, #22c55e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 12px 28px rgba(34, 197, 94, 0.25);
        }

        h1 {
            margin: 0;
            color: #14532d;
            font-size: 30px;
        }

        .subtitle {
            margin-top: 6px;
            color: #6b7280;
            font-size: 14px;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 22px;
            padding: 18px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
            border: 1px solid #dcfce7;
            margin-bottom: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat {
            background: #f7fff8;
            border: 1px solid #d1fae5;
            border-radius: 18px;
            padding: 16px;
            text-align: center;
        }

        .stat .label {
            font-size: 13px;
            color: #6b7280;
        }

        .stat .value {
            margin-top: 6px;
            font-size: 24px;
            font-weight: 700;
            color: #14532d;
        }

        .menu a {
            display: block;
            text-decoration: none;
            color: #14532d;
            background: #f7fff8;
            border: 1px solid #d1fae5;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            border-top: 1px solid #d1fae5;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 10px 6px;
            backdrop-filter: blur(8px);
        }

        .bottom-nav a {
            text-decoration: none;
            color: #14532d;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
        }

        .active {
            color: #16a34a !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">🐄</div>
            <h1>Dashboard</h1>
            <div class="subtitle">ภาพรวมการใช้งานระบบ Charolais AI Scan</div>
        </div>

        <div class="card">
            <div class="grid">
                <div class="stat">
                    <div class="label">สแกนทั้งหมด</div>
                    <div class="value" id="totalScans">0</div>
                </div>
                <div class="stat">
                    <div class="label">ตรวจพบหน้าวัว</div>
                    <div class="value" id="successScans">0</div>
                </div>
                <div class="stat">
                    <div class="label">คะแนนเฉลี่ย</div>
                    <div class="value" id="avgScore">-</div>
                </div>
                <div class="stat">
                    <div class="label">ผลล่าสุด</div>
                    <div class="value" id="lastStatus">-</div>
                </div>
            </div>
        </div>

        <div class="card menu">
            <a href="result.html">📊 ดูผล AI Result</a>
            <a href="history.html">🕘 ดูประวัติการสแกน</a>
            <a href="profile.html">👤 จัดการโปรไฟล์</a>
            <a href="settings.html">⚙️ ตั้งค่าระบบ</a>
            <a href="https://charolais-ai-scan.netlify.app">📷 กลับไปหน้าสแกนหลัก</a>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="active">🏠<br>Home</a>
        <a href="index.html">📷<br>Scan</a>
        <a href="history.html">🕘<br>History</a>
        <a href="profile.html">👤<br>Profile</a>
    </div>

    <script>
        const history = JSON.parse(localStorage.getItem("scanHistory")) || [];
        const total = history.length;
        const success = history.filter(x => x.status === "ตรวจพบหน้าวัว").length;

        const scores = history
            .map(x => parseFloat(String(x.beautyScore).replace("/10", "")))
            .filter(x => !isNaN(x));

        const avg = scores.length
            ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1)
            : "-";

        document.getElementById("totalScans").textContent = total;
        document.getElementById("successScans").textContent = success;
        document.getElementById("avgScore").textContent = avg === "-" ? "-" : avg + "/10";
        document.getElementById("lastStatus").textContent = history[0]?.status || "-";
    </script>
</body>

</html>
